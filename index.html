<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz App</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.hidden {
  display: none;
}

#quiz {
  margin-top: 20px;
}

button {
  display: block;
  margin: 10px auto;
  padding: 10px 20px;
  width: 250px;
  cursor: pointer;
}

.correct {
  color: green;
}

.wrong {
  color: red;
}

/* Progress Bar */
#progressBarContainer {
  width: 80%;
  height: 20px;
  background: #ddd;
  margin: 15px auto;
  border-radius: 10px;
  overflow: hidden;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: green;
}

/* Timer */
#timer {
  font-size: 18px;
  margin: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Quiz App</h1>

<!-- 🟢 MENU -->
<div id="menu">
  <h2>Select Section</h2>

  <button onclick="startSection('section1')">Section 1</button>
  <button onclick="startSection('section2')">Section 2</button>
  <button onclick="startSection('section3')">Section 3</button>
  <button onclick="startSection('section4')">Section 4</button>
  <button onclick="startSection('section5')">Section 5</button>
  <button onclick="startSection('section6')">Section 6</button>
  <button onclick="startSection('section7')">Section 7</button>
  <button onclick="startSection('section8')">Section 8</button>

</div>

<!-- 🔵 QUIZ AREA -->
<div id="quiz" class="hidden">

  <!-- Timer -->
  <div id="timer">Time: 60:00</div>

  <!-- Progress Bar -->
  <div id="progressBarContainer">
    <div id="progressBar"></div>
  </div>

  <!-- Question -->
  <h2 id="question"></h2>

  <!-- Options -->
  <div id="options"></div>

  <!-- Feedback -->
  <p id="feedback"></p>

</div>

<!-- 🔗 JS FILE -->
<script src="script.js"></script>

</body>
</html>
